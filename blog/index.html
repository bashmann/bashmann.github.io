<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben Ashcroft - Blog</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="background"></div>
<div class="splash"></div>
<script src="/topbar.js"></script>

<section id="piece">
    <div class="blog-list" id="blog-list">
        <p class="blog-empty">Loading...</p>
    </div>
</section>

<style>
    .blog-list { max-width: 48em; margin: 4em auto; padding: 0 var(--showcasePadding); display: flex; flex-direction: column; gap: 1em; }
    .blog-entry a { text-decoration: none; }
    .blog-entry h2 { font-size: 1.1em; color: var(--textColor); transition: color 0.2s; }
    .blog-entry:hover h2 { color: var(--offTextColor); }
    .blog-empty { color: var(--offTextColor); }
</style>

<script>
fetch('/public/Pages/Blog/posts.json')
    .then(function(r){ return r.json(); })
    .then(function(posts){
        var list = document.getElementById('blog-list');
        list.innerHTML = '';
        if (!posts.length) { list.innerHTML = '<p class="blog-empty">No posts yet.</p>'; return; }
        return Promise.all(posts.map(function(slug){
            return fetch('/public/Pages/Blog/' + slug + '.md')
                .then(function(r){ return r.text(); })
                .then(function(text){
                    var m = text.match(/^#\s+(.+)/m);
                    return { slug: slug, title: m ? m[1] : slug.replace(/[-_]/g,' ') };
                });
        })).then(function(items){
            items.forEach(function(item){
                var div = document.createElement('div');
                div.className = 'blog-entry';
                div.innerHTML = '<a href="/blog/post/?post=' + encodeURIComponent(item.slug) + '"><h2>' + item.title + '</h2></a>';
                list.appendChild(div);
            });
        });
    })
    .catch(function(){ document.getElementById('blog-list').innerHTML = '<p class="blog-empty">Could not load posts.</p>'; });
</script>

<script src="/app.js"></script>
</body>
</html>
