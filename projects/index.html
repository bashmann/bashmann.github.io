<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben Ashcroft - Projects</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="background"></div>
<div class="splash"></div>
<script src="/topbar.js"></script>

<section id="piece">
    <div class="projects-gallery">

        <div class="video-wrap featured">
            <iframe title="Wardogs" src="https://www.youtube.com/embed/OCnEi5npoTE?vq=hd1080" frameborder="0" allowfullscreen></iframe>
            <p>Wardogs</p>
        </div>

        <h2 class="section-header">Previous Projects</h2>

        <div class="video-wrap">
            <iframe title="Sniper Elite 5" src="https://www.youtube.com/embed/Kvl80YnxLgE" frameborder="0" allowfullscreen></iframe>
            <p>Sniper Elite 5</p>
        </div>

        <div class="video-wrap">
            <iframe title="Evil Genius 2: World Domination" src="https://www.youtube.com/embed/7fZ7EutB6CE" frameborder="0" allowfullscreen></iframe>
            <p>Evil Genius 2: World Domination</p>
        </div>

        <div class="video-wrap">
            <iframe title="Forza Street" src="https://www.youtube.com/embed/rj1OAylFoM0" frameborder="0" allowfullscreen></iframe>
            <p>Forza Street</p>
        </div>

        <div class="video-wrap">
            <iframe title="Samsung: Life Unstoppable" src="https://www.youtube.com/embed/Ztb5wyYIxT4" frameborder="0" allowfullscreen></iframe>
            <p>Samsung: Life Unstoppable</p>
        </div>

    </div>
</section>

<style>
    .projects-gallery {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2vw;
        padding-left: 5vw;
        padding-right: 5vw;
    }
    .projects-gallery .featured {
        grid-column: 1 / -1;
        width: 58.6vw;
        justify-self: center;
    }
    .projects-gallery .section-header {
        grid-column: 1 / -1;
        margin-top: 1vw;
    }
    .projects-gallery .video-wrap {
        display: flex;
        flex-direction: column;
        gap: 0.5em;
    }
    .projects-gallery .video-wrap iframe {
        width: 100%;
        aspect-ratio: 16 / 9;
        display: block;
    }
    .projects-gallery .video-wrap p {
        font-size: 0.9em;
        color: var(--offTextColor);
    }
</style>

<script src="/app.js"></script>
</body>
</html>
